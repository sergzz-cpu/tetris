<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тетрис | Классическая игра</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #0a0c18 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', monospace;
            margin: 0;
            padding: 20px;
        }

        /* основной контейнер — адаптивная сетка */
        .game-container {
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 20px 25px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(72, 187, 255, 0.2);
        }

        .tetris-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            row-gap: 25px;
        }

        /* игровое поле */
        .play-area {
            text-align: center;
        }

        canvas#boardCanvas {
            background-color: #0f121f;
            border-radius: 24px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5), inset 0 0 0 2px rgba(66, 220, 255, 0.3);
            display: block;
            margin: 0 auto;
            width: 100%;
            height: auto;
            image-rendering: crisp-edges;
        }

        /* инфо-блок */
        .info-area {
            background: rgba(18, 22, 35, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 20px 25px;
            min-width: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .score-card {
            background: #01010166;
            border-radius: 28px;
            padding: 12px 20px;
            width: 100%;
            text-align: center;
        }

        .score-card h3 {
            margin: 0 0 8px 0;
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 1.2rem;
            color: #9dd9ff;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0;
            color: #f2f6ff;
            text-shadow: 0 0 8px #00ccff;
            font-family: monospace;
        }

        .next-label {
            font-size: 1rem;
            font-weight: 500;
            color: #9dd9ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        canvas#nextCanvas {
            background-color: #0f121f;
            border-radius: 20px;
            box-shadow: 0 0 0 2px #2d4f6e;
            width: 100%;
            max-width: 120px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            background: #1e2a3a;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 0 #0a1017;
            transition: 0.07s linear;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a1017;
        }

        .restart-btn {
            background: #2c2f4a;
            box-shadow: 0 4px 0 #151a2a;
            color: #ffe2b5;
        }

        .mobile-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
        }

        .row-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            background: #0e1622cc;
            backdrop-filter: blur(8px);
            font-size: 1.8rem;
            padding: 12px 24px;
            min-width: 75px;
            justify-content: center;
        }

        @media (max-width: 650px) {
            .game-container {
                padding: 12px 15px;
            }
            .info-area {
                min-width: 130px;
                padding: 15px;
            }
            .score-value {
                font-size: 2rem;
            }
            .ctrl-btn {
                font-size: 1.4rem;
                padding: 8px 18px;
                min-width: 65px;
            }
            button {
                padding: 7px 15px;
                font-size: 1rem;
            }
        }

        @media (max-width: 520px) {
            .row-buttons {
                gap: 12px;
            }
            .ctrl-btn {
                padding: 6px 12px;
                min-width: 55px;
                font-size: 1.2rem;
            }
        }

        .status-message {
            font-size: 0.85rem;
            background: #00000066;
            border-radius: 40px;
            padding: 6px 12px;
            color: #d4edff;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="tetris-panel">
        <div class="play-area">
            <canvas id="boardCanvas" width="300" height="600"></canvas>
        </div>
        <div class="info-area">
            <div class="score-card">
                <h3>⚡ СЧЁТ</h3>
                <div class="score-value" id="scoreDisplay">0</div>
            </div>
            <div class="next-label">▶ СЛЕДУЮЩАЯ</div>
            <canvas id="nextCanvas" width="120" height="120"></canvas>
            <div class="controls">
                <button id="restartButton" class="restart-btn">🔄 НОВАЯ</button>
            </div>
            <div class="status-message" id="gameStatusMsg">● ИГРА АКТИВНА</div>
        </div>
    </div>
    <div class="mobile-controls">
        <div class="row-buttons">
            <button class="ctrl-btn" id="moveLeftBtn">◀ ЛЕВО</button>
            <button class="ctrl-btn" id="moveRightBtn">ПРАВО ▶</button>
        </div>
        <div class="row-buttons">
            <button class="ctrl-btn" id="rotateBtn">🔄 ПОВОРОТ</button>
            <button class="ctrl-btn" id="hardDropBtn">⬇️ БРОСОК</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- КОНСТАНТЫ ТЕТРИСА ----------
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;      // canvas 300x600
        const NEXT_SIZE = 24;        // размер блока в окне "следующая фигура" (canvas 120/24 ≈5x5)
        
        // Игровое поле (матрица 0 / цветовые коды)
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        
        // Фигуры (тетрамино) и их цвета
        const TETROMINOS = [
            {   // I
                shape: [[1,1,1,1]],
                color: '#00f0f0' 
            },
            {   // O
                shape: [[1,1],[1,1]],
                color: '#f0e040' 
            },
            {   // T
                shape: [[0,1,0],[1,1,1]],
                color: '#c060f0' 
            },
            {   // S
                shape: [[0,1,1],[1,1,0]],
                color: '#60f060' 
            },
            {   // Z
                shape: [[1,1,0],[0,1,1]],
                color: '#f06060' 
            },
            {   // L
                shape: [[1,0,0],[1,1,1]],
                color: '#f0a030' 
            },
            {   // J
                shape: [[0,0,1],[1,1,1]],
                color: '#4060f0' 
            }
        ];
        
        // Текущая активная фигура
        let currentPiece = {
            tetro: null,
            x: 3,
            y: 0,
            shape: [],
            color: ''
        };
        
        let nextTetromino = null;    // объект из TETROMINOS
        let score = 0;
        let gameLoopInterval = null;
        let isGameOver = false;
        let baseSpeed = 450;          // мс на падение (начальный)
        let currentSpeed = baseSpeed;
        
        // DOM элементы
        const boardCanvas = document.getElementById('boardCanvas');
        const boardCtx = boardCanvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const gameStatusMsg = document.getElementById('gameStatusMsg');
        
        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
        function getRandomTetromino() {
            const idx = Math.floor(Math.random() * TETROMINOS.length);
            const original = TETROMINOS[idx];
            // глубокое клонирование формы
            const shapeCopy = original.shape.map(row => [...row]);
            return {
                shape: shapeCopy,
                color: original.color
            };
        }
        
        // Инициализация следующей фигуры и создание новой текущей
        function spawnNewPiece() {
            if (!nextTetromino) {
                nextTetromino = getRandomTetromino();
            }
            // текущая фигура = то, что было в next
            const newPieceTetro = {
                shape: nextTetromino.shape.map(row => [...row]),
                color: nextTetromino.color
            };
            // генерируем новую следующую
            nextTetromino = getRandomTetromino();
            
            currentPiece.tetro = newPieceTetro;
            currentPiece.shape = newPieceTetro.shape;
            currentPiece.color = newPieceTetro.color;
            currentPiece.x = Math.floor((COLS - currentPiece.shape[0].length) / 2);
            currentPiece.y = 0;
            
            // Проверка на коллизию сразу после спавна (game over)
            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                gameOver();
                return false;
            }
            return true;
        }
        
        // Проверка пересечения фигуры с полем / границами
        function collision(shape, offsetX, offsetY) {
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[0].length; col++) {
                    if (shape[row][col] !== 0) {
                        const boardX = offsetX + col;
                        const boardY = offsetY + row;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) {
                            return true;
                        }
                        if (boardY >= 0 && board[boardY][boardX] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        // Закрепить фигуру на поле
        function mergePiece() {
            for (let row = 0; row < currentPiece.shape.length; row++) {
                for (let col = 0; col < currentPiece.shape[0].length; col++) {
                    if (currentPiece.shape[row][col] !== 0) {
                        const boardX = currentPiece.x + col;
                        const boardY = currentPiece.y + row;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
            // очистка линий и начисление очков
            clearLines();
            // спавн следующей фигуры
            const success = spawnNewPiece();
            if (!success) return;
            // отрисовка
            drawAll();
            // если игра не закончена, то перезапускаем интервал с актуальной скоростью
            resetGameInterval();
        }
        
        // Очистка заполненных линий и обновление счета
        function clearLines() {
            let linesCleared = 0;
            for (let row = ROWS-1; row >= 0; ) {
                let full = true;
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] === 0) {
                        full = false;
                        break;
                    }
                }
                if (full) {
                    // удаляем строку
                    for (let r = row; r > 0; r--) {
                        board[r] = [...board[r-1]];
                    }
                    board[0] = Array(COLS).fill(0);
                    linesCleared++;
                    // проверяем эту же строку снова
                } else {
                    row--;
                }
            }
            
            if (linesCleared > 0) {
                // Подсчет очков по классике
                const points = [0, 40, 100, 300, 1200];
                const addScore = points[Math.min(linesCleared,4)];
                score += addScore;
                updateScoreUI();
                // динамическое увеличение скорости (чем больше очков, тем быстрее)
                adjustSpeedByScore();
                resetGameInterval();
            }
        }
        
        function adjustSpeedByScore() {
            // новая скорость: от 450 до 100 ms (максимальная скорость)
            let newSpeed = Math.max(100, baseSpeed - Math.floor(score / 600) * 25);
            newSpeed = Math.min(baseSpeed, newSpeed);
            if (newSpeed !== currentSpeed) {
                currentSpeed = newSpeed;
            }
        }
        
        function resetGameInterval() {
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            if (!isGameOver) {
                gameLoopInterval = setInterval(() => {
                    if (!isGameOver) {
                        movePieceDown();
                    }
                }, currentSpeed);
            }
        }
        
        // Движение вниз
        function movePieceDown() {
            if (isGameOver) return;
            currentPiece.y++;
            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                currentPiece.y--;
                mergePiece();
            }
            drawAll();
        }
        
        function moveHorizontal(dx) {
            if (isGameOver) return;
            currentPiece.x += dx;
            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                currentPiece.x -= dx;
            }
            drawAll();
        }
        
        function rotatePiece() {
            if (isGameOver) return;
            // поворот матрицы фигуры
            const oldShape = currentPiece.shape;
            const rotated = oldShape[0].map((_, idx) => oldShape.map(row => row[idx]).reverse());
            const originalShape = currentPiece.shape;
            currentPiece.shape = rotated;
            // обработка стен (коррекция)
            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                // попробуем сдвинуть влево/вправо
                for (let offset of [-1, 1, -2, 2]) {
                    currentPiece.x += offset;
                    if (!collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                        drawAll();
                        return;
                    }
                    currentPiece.x -= offset;
                }
                // откат
                currentPiece.shape = originalShape;
            }
            drawAll();
        }
        
        function hardDrop() {
            if (isGameOver) return;
            while (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
            }
            mergePiece();  // закрепляем и создаем новую фигуру
            drawAll();
        }
        
        function gameOver() {
            if (isGameOver) return;
            isGameOver = true;
            if (gameLoopInterval) {
                clearInterval(gameLoopInterval);
                gameLoopInterval = null;
            }
            gameStatusMsg.innerHTML = '💀 GAME OVER — НАЖМИТЕ НОВАЯ 💀';
            gameStatusMsg.style.color = "#ff9e8f";
            drawAll(); // прорисовка финального состояния
        }
        
        function restartGame() {
            // сброс поля
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            isGameOver = false;
            currentSpeed = baseSpeed;
            updateScoreUI();
            gameStatusMsg.innerHTML = '● ИГРА АКТИВНА';
            gameStatusMsg.style.color = "#d4edff";
            
            // генерируем следующую и текущую фигуру заново
            nextTetromino = getRandomTetromino();
            const successSpawn = (function initNewGame() {
                const newNext = getRandomTetromino();
                nextTetromino = newNext;
                const startingPiece = {
                    shape: nextTetromino.shape.map(row => [...row]),
                    color: nextTetromino.color
                };
                currentPiece.tetro = startingPiece;
                currentPiece.shape = startingPiece.shape;
                currentPiece.color = startingPiece.color;
                currentPiece.x = Math.floor((COLS - currentPiece.shape[0].length) / 2);
                currentPiece.y = 0;
                nextTetromino = getRandomTetromino();
                if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                    // маловероятно при старте, но на всякий случай очистим
                    board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                    currentPiece.y = 0;
                    if(collision(currentPiece.shape, currentPiece.x, currentPiece.y)) return false;
                }
                return true;
            })();
            
            if (!successSpawn) {
                // форс-очистка поля
                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                nextTetromino = getRandomTetromino();
                const fallbackPiece = {
                    shape: nextTetromino.shape.map(r=>[...r]),
                    color: nextTetromino.color
                };
                currentPiece.shape = fallbackPiece.shape;
                currentPiece.color = fallbackPiece.color;
                currentPiece.x = 3;
                currentPiece.y = 0;
                nextTetromino = getRandomTetromino();
            }
            
            // перезапускаем интервал
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(() => {
                if (!isGameOver) movePieceDown();
            }, currentSpeed);
            
            drawAll();
        }
        
        // Отрисовка всего (поле + текущая фигура + следующая)
        function drawBoard() {
            boardCtx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
            // рисуем сетку + блоки
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const color = board[row][col];
                    if (color !== 0) {
                        boardCtx.fillStyle = color;
                        boardCtx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                        boardCtx.shadowBlur = 0;
                        // легкая обводка
                        boardCtx.strokeStyle = '#ffffff40';
                        boardCtx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                    } else {
                        boardCtx.fillStyle = '#0a0e1a';
                        boardCtx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                        boardCtx.strokeStyle = '#1f2a3e';
                        boardCtx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                    }
                }
            }
            // отрисовка текущей падающей фигуры
            if (currentPiece && currentPiece.shape && !isGameOver) {
                for (let row = 0; row < currentPiece.shape.length; row++) {
                    for (let col = 0; col < currentPiece.shape[0].length; col++) {
                        if (currentPiece.shape[row][col]) {
                            const x = (currentPiece.x + col) * BLOCK_SIZE;
                            const y = (currentPiece.y + row) * BLOCK_SIZE;
                            boardCtx.fillStyle = currentPiece.color;
                            boardCtx.fillRect(x, y, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                            boardCtx.strokeStyle = '#ffffffaa';
                            boardCtx.strokeRect(x, y, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                        }
                    }
                }
            }
        }
        
        function drawNext() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            nextCtx.fillStyle = '#0f121f';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextTetromino) {
                const shape = nextTetromino.shape;
                const color = nextTetromino.color;
                const shapeCols = shape[0].length;
                const shapeRows = shape.length;
                const blockRenderSize = NEXT_SIZE;
                const offsetX = (nextCanvas.width - (shapeCols * blockRenderSize)) / 2;
                const offsetY = (nextCanvas.height - (shapeRows * blockRenderSize)) / 2;
                for (let row = 0; row < shapeRows; row++) {
                    for (let col = 0; col < shapeCols; col++) {
                        if (shape[row][col]) {
                            nextCtx.fillStyle = color;
                            nextCtx.fillRect(offsetX + col * blockRenderSize, offsetY + row * blockRenderSize, blockRenderSize-1, blockRenderSize-1);
                            nextCtx.strokeStyle = '#b0e0ff';
                            nextCtx.strokeRect(offsetX + col * blockRenderSize, offsetY + row * blockRenderSize, blockRenderSize-1, blockRenderSize-1);
                        }
                    }
                }
            }
        }
        
        function updateScoreUI() {
            scoreDisplay.innerText = score;
        }
        
        function drawAll() {
            drawBoard();
            drawNext();
        }
        
        // ---------- УПРАВЛЕНИЕ С КЛАВИАТУРЫ (для ПК) ----------
        function handleKeyDown(e) {
            if (isGameOver) {
                if (e.code === 'Space' || e.code === 'KeyR') {
                    e.preventDefault();
                    restartGame();
                }
                return;
            }
            const key = e.key;
            e.preventDefault();
            switch (key) {
                case 'ArrowLeft': moveHorizontal(-1); break;
                case 'ArrowRight': moveHorizontal(1); break;
                case 'ArrowDown': movePieceDown(); break;
                case 'ArrowUp': rotatePiece(); break;
                case ' ': case 'Space': hardDrop(); break;
                case 'r': case 'R': restartGame(); break;
                default: break;
            }
        }
        
        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function init() {
            // подготавливаем первую игру
            nextTetromino = getRandomTetromino();
            const startPiece = {
                shape: nextTetromino.shape.map(row => [...row]),
                color: nextTetromino.color
            };
            currentPiece.tetro = startPiece;
            currentPiece.shape = startPiece.shape;
            currentPiece.color = startPiece.color;
            currentPiece.x = 3;
            currentPiece.y = 0;
            nextTetromino = getRandomTetromino();
            // проверка стартовой коллизии (чистое поле)
            if (!collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                isGameOver = false;
            } else {
                // если вдруг, перезапускаем чистым полем
                board = Array(ROWS).fill().map(()=>Array(COLS).fill(0));
                isGameOver = false;
            }
            score = 0;
            updateScoreUI();
            currentSpeed = baseSpeed;
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(() => {
                if (!isGameOver) movePieceDown();
            }, currentSpeed);
            drawAll();
            
            // события клавиатуры
            window.addEventListener('keydown', handleKeyDown);
            // кнопки
            document.getElementById('restartButton').addEventListener('click', () => restartGame());
            document.getElementById('moveLeftBtn').addEventListener('click', () => moveHorizontal(-1));
            document.getElementById('moveRightBtn').addEventListener('click', () => moveHorizontal(1));
            document.getElementById('rotateBtn').addEventListener('click', () => rotatePiece());
            document.getElementById('hardDropBtn').addEventListener('click', () => hardDrop());
            // предотвращаем случайные скроллы на телефонах при касании кнопок
            const allBtns = document.querySelectorAll('button');
            allBtns.forEach(btn => btn.addEventListener('touchstart', (e) => { e.preventDefault(); btn.click(); }));
        }
        
        init();
    })();
</script>
</body>
</html>
